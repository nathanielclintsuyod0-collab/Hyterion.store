<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VanillaMyst SMP — Elite Vanilla Experience</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: #05050f;
  color: #f0e6ff;
  overflow-x: hidden;
  position: relative;
}

/* Luxury Background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(circle at 20% 30%, rgba(180, 100, 255, 0.25) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(255, 180, 100, 0.2) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.08) 0%, transparent 70%);
  z-index: -2;
  animation: luxuryShift 40s ease-in-out infinite;
}
@keyframes luxuryShift {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.15) rotate(180deg); }
}

/* FLOATING NAV WITH GLOW */
header {
  background: rgba(10, 10, 25, 0.75);
  backdrop-filter: blur(32px);
  border-bottom: 1px solid rgba(200, 150, 255, 0.25);
  padding: 1.3rem 0;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  box-shadow: 
    0 8px 32px rgba(0, 0, 0, 0.4),
    0 0 25px rgba(167, 139, 255, 0.3),
    0 0 45px rgba(255, 215, 0, 0.15);
  transition: all 0.4s ease;
}

header.scrolled {
  background: rgba(8, 8, 20, 0.92);
  padding: 1rem 0;
  box-shadow: 
    0 10px 40px rgba(0, 0, 0, 0.5),
    0 0 35px rgba(167, 139, 255, 0.5),
    0 0 60px rgba(255, 215, 0, 0.25);
}

.header-container {
  max-width: 1480px;
  margin: 0 auto;
  padding: 0 4rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 1.3rem;
  font-size: 2.1rem;
  font-weight: 800;
  background: linear-gradient(90deg, #a78bff, #f0c3ff, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo-icon { font-size: 3rem; animation: royalPulse 3s infinite; }
@keyframes royalPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }

nav a {
  color: #d4c4ff;
  text-decoration: none;
  font-weight: 500;
  padding: 0.8rem 1.6rem;
  border-radius: 50px;
  transition: all 0.4s ease;
}
nav a:hover {
  color: #fff;
  background: rgba(167, 139, 255, 0.25);
  transform: translateY(-4px);
  box-shadow: 0 0 20px rgba(167, 139, 255, 0.4);
}

/* Hero & Other Sections (same premium style) */
.hero {
  min-height: 92vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 2rem;
  margin-top: 80px; /* Space for fixed navbar */
}

.hero-content h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(4rem, 11vw, 8rem);
  font-weight: 700;
  background: linear-gradient(90deg, #c8a2ff, #ffd700, #ff9aff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -2px;
}

/* Ranks, Stats, Buttons - Keeping the ultra-luxury styling from before */
.section { padding: 8rem 2rem; max-width: 1480px; margin: 0 auto; }
.section h2 {
  font-family: 'Playfair Display', serif;
  font-size: 3.8rem;
  text-align: center;
  margin-bottom: 4.5rem;
  background: linear-gradient(90deg, #e0b3ff, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.ranks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 2.8rem;
}

.rank-card {
  background: rgba(15, 15, 35, 0.8);
  backdrop-filter: blur(32px);
  border: 2px solid rgba(200, 150, 255, 0.2);
  padding: 3.5rem 2.5rem;
  border-radius: 36px;
  text-align: center;
  transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  position: relative;
  overflow: hidden;
}

.rank-card:hover {
  transform: translateY(-25px) scale(1.03);
  border-color: #ffd700;
  box-shadow: 0 40px 80px rgba(255, 215, 0, 0.25);
}

.rank-card.popular {
  border-color: #ffd700;
  box-shadow: 0 0 50px rgba(255, 215, 0, 0.35);
}

.popular-badge {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(90deg, #ffd700, #ffeb3b);
  color: #1a0033;
  font-weight: 700;
  padding: 8px 32px;
  border-radius: 50px;
  font-size: 0.95rem;
  box-shadow: 0 10px 25px rgba(255, 215, 0, 0.6);
  letter-spacing: 1.5px;
  z-index: 10;
}

/* Rest of your premium styles */
.btn {
  background: linear-gradient(90deg, #9f7aff, #ff9aff);
  padding: 1.4rem 3.5rem;
  border-radius: 50px;
  color: white;
  font-weight: 600;
  font-size: 1.2rem;
  box-shadow: 0 15px 40px rgba(159, 122, 255, 0.4);
  transition: all 0.5s;
}
.btn:hover {
  transform: translateY(-8px);
  box-shadow: 0 25px 60px rgba(159, 122, 255, 0.6);
}

@media (max-width: 768px) {
  .header-container { padding: 0 1.5rem; flex-direction: column; gap: 1.5rem; }
  .ranks-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>
<div class="particles" id="particles"></div>

<header id="navbar">
  <div class="header-container">
    <div class="logo">
      <span class="logo-icon">⚡</span>
      VanillaMyst
    </div>
    <nav>
      <a href="#home">Home</a>
      <a href="#ranks">Ranks</a>
      <a href="#info">Server</a>
      <a href="#store">Store</a>
    </nav>
  </div>
</header>

<!-- Rest of your sections (Hero, Stats, Ranks, Info, Store) remain the same as previous ultra-luxury version -->

<section class="hero" id="home">
  <div class="hero-content">
    <h1>VanillaMyst</h1>
    <p>The Pinnacle of Premium Vanilla Minecraft</p>
    <span id="playercount" style="background: rgba(10,10,25,0.7); padding: 1.2rem 3.5rem; border-radius: 60px; font-size: 1.35rem; border: 1px solid rgba(255,215,0,0.3);">Loading elite players...</span>
  </div>
</section>

<!-- Add your ranks, server info, store sections here... -->

<script>
// Navbar glow on scroll
window.addEventListener('scroll', () => {
  const navbar = document.getElementById('navbar');
  if (window.scrollY > 50) {
    navbar.classList.add('scrolled');
  } else {
    navbar.classList.remove('scrolled');
  }
});

// Your other scripts (particles, server status, etc.)
</script>
</body>
</html>
