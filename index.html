<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyTerion SMP</title>

<style>
body { margin:0; font-family: Arial; background:#82C3D9; color:white; }
header { text-align:center; padding:20px; }
nav a { margin:0 15px; color:#00ccff; text-decoration:none; }
.section { padding:40px; text-align:center; }

.card {
  background:#11163a;
  padding:20px;
  margin:10px;
  border-radius:15px;
  display:inline-block;
  width:220px;
  transition:0.3s;
}
.card:hover { transform:translateY(-10px) scale(1.05); }

.icon { font-size:30px; display:block; animation: float 2s infinite; }
@keyframes float {
  0%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
  100%{transform:translateY(0)}
}

.gradient {
  font-weight:bold;
  background: linear-gradient(90deg,#00ffff,#00ccff,#ffffff);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:move 3s infinite linear;
}
@keyframes move { 0%{background-position:0%} 100%{background-position:200%} }

button { padding:10px; background:#00ccff; border:none; border-radius:5px; cursor:pointer; }
input, select { padding:10px; margin:5px; width:220px; }
</style>
</head>

<body>

<header>
<img src="logo.png" width="200">
<h1 class="gradient">HyTerion SMP</h1>
<nav>
<a href="#home">Home</a>
<a href="#ranks">Ranks</a>
<a href="#info">Info</a>
<a href="#store">Store</a>
</nav>
</header>

<div class="section" id="home">
<h2>Welcome</h2>
<p>Player Count: <span id="playercount">Loading...</span></p>
</div>

<div class="section" id="ranks">
<h2>Ranks</h2>

<div class="card"><span class="icon">💠</span><span class="gradient">Crystal</span><br>₱50</div>
<div class="card"><span class="icon">🌩️</span><span class="gradient">Storm</span><br>₱100</div>
<div class="card"><span class="icon">🔥</span><span class="gradient">Inferno</span><br>₱150</div>
<div class="card"><span class="icon">🩸</span><span class="gradient">Bloodline</span><br>₱200</div>
<div class="card"><span class="icon">👑</span><span class="gradient">Mythic</span><br>₱400</div>

</div>

<div class="section" id="info">
<h2>Server Info</h2>
<p id="serverIP">play.hyterion.net</p>
<button onclick="copyIP()">Copy IP</button>
<p><a href="https://discord.gg/gjpXJfQCbc" target="_blank">Join Discord</a></p>
</div>

<div class="section" id="store">
<h2>Buy Rank</h2>

<input type="text" id="username" placeholder="Minecraft Username"><br>

<select id="rank">
<option>Crystal</option>
<option>Storm</option>
<option>Inferno</option>
<option>Bloodline</option>
<option>Mythic</option>
</select><br>

<h3>Upload GCash Proof</h3>
<input type="file" id="proof"><br>

<button onclick="generateCode()">Submit Purchase</button>
<p id="code"></p>
</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔧 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
    apiKey: "AIzaSyAmvp_rslpGCAqRWYjUPEf4u0e_ZpOsh1I",
    authDomain: "hyterionstore.firebaseapp.com",
    projectId: "hyterionstore",
    storageBucket: "hyterionstore.firebasestorage.app",
    messagingSenderId: "414597523246",
    appId: "1:414597523246:web:1a3d8a5345e061a48e7cbf"
};

firebase.initializeApp(firebaseConfig);

const storage = firebase.storage();
const db = firebase.firestore();

async function generateCode(){
  let user = document.getElementById('username').value;
  let rank = document.getElementById('rank').value;
  let file = document.getElementById('proof').files[0];

  if(!user || !file){
    alert("Fill everything!");
    return;
  }

  let code = 'HT-' + Math.random().toString(36).substr(2,9).toUpperCase();

  // Upload proof
  let ref = storage.ref("proofs/" + code + ".png");
  await ref.put(file);
  let url = await ref.getDownloadURL();

  // Save data
  await db.collection("orders").doc(code).set({
    username: user,
    rank: rank,
    proof: url,
    status: "pending",
    date: new Date()
  });

  // Discord webhook
  fetch("YOUR_DISCORD_WEBHOOK", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      content:
`🛒 NEW PURCHASE
👤 ${user}
💎 ${rank}
🧾 ${code}
📸 ${url}`
    })
  });

  document.getElementById('code').innerText =
    "Transaction Code: " + code + " (Pending)";
}

function copyIP(){
  navigator.clipboard.writeText(document.getElementById('serverIP').innerText);
  alert("Copied!");
}

// Player count
fetch('https://api.mcsrvstat.us/2/play.hyterion.net')
.then(res => res.json())
.then(data => {
  document.getElementById('playercount').innerText =
    data.online ? data.players.online : "Offline";
});
</script>

</body>
</html>
